name: CI
run-name: CI ${{ github.event.head_commit.message || github.event.pull_request.title }}

on:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ci:
    uses: bamiyanapp/dev-standards/.github/workflows/reusable-ci.yml@main
    with:
      frontend_dir: frontend
      backend_dir: backend
      node_version: "20"
      enable_e2e_test: true
      enable_release_sync: false
    secrets:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
